<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>둥둥 오리</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #aaccff; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/controls/DragControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/DragControls.js",
                "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>
</head>
<body>

    <script type="module">
        import * as THREE from 'three';
        import { DragControls } from 'three/examples/jsm/controls/DragControls.js';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

        // 1. 무대(Scene)와 카메라 세팅
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaccff);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. 화면 회전 컨트롤 (마우스 우클릭으로 회전)
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.mouseButtons = {
            LEFT: null, 
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.ROTATE
        };

        // 3. 조명 세팅
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // 4. 파란색 물 판데기
        const waterGeometry = new THREE.BoxGeometry(20, 0.1, 20);
        const waterMaterial = new THREE.MeshStandardMaterial({ color: 0x0066ff, roughness: 0.2 });
        const water = new THREE.Mesh(waterGeometry, waterMaterial);
        water.position.y = -0.5;
        scene.add(water);

        // 5. 🐤 장난감 오리 그룹 조립 (정석대로 조립)
        const duckGroup = new THREE.Group();
        const yellowMat = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.4 });
        const orangeMat = new THREE.MeshStandardMaterial({ color: 0xff4500 });

        const body = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), yellowMat);
        body.scale.set(1.2, 1, 1);
        duckGroup.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), yellowMat);
        head.position.set(0.6, 0.8, 0);
        duckGroup.add(head);

        const beak = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.4, 32), orangeMat);
        beak.position.set(1.1, 0.8, 0);
        beak.rotation.z = -Math.PI / 2;
        duckGroup.add(beak);

        scene.add(duckGroup);

        // 6. 🖱️ 드래그 세팅 (정석 돌파)
        // 드래그 라이브러리에는 개별 부품들을 등록해 둡니다.
        const allParts = [body, head, beak];
        const dragControls = new DragControls(allParts, camera, renderer.domElement);
        
        let isDragging = false;
        const dragOffset = new THREE.Vector3();

        // ★ [사지분해 절대 방지 로직]
        // 부품이 드래그될 때, 그 부품을 움직이지 않고 부모인 'duckGroup 전체'를 대신 움직이게 가로챕니다!
        dragControls.addEventListener('dragstart', (event) => {
            isDragging = true;
            orbitControls.enabled = false; // 드래그 중 화면 회전 방지
            
            // 마우스로 집은 부품의 월드 좌표와 오리 그룹 중심점의 차이를 계산해 저장
            dragOffset.copy(duckGroup.position).sub(event.object.position);
        });

        dragControls.addEventListener('drag', (event) => {
            // 부품이 마우스를 따라 이동하면, 즉시 그 좌표를 그룹 전체의 좌표로 치환하고 부품은 제자리에 고정합니다.
            duckGroup.position.copy(event.object.position).add(dragOffset);
            
            // 부품이 그룹 내부에서 탈출하지 못하도록 강제로 상대 좌표를 리셋합니다.
            body.position.set(0, 0, 0);
            head.position.set(0.6, 0.8, 0);
            beak.position.set(1.1, 0.8, 0);
        });

        dragControls.addEventListener('dragend', () => {
            isDragging = false;
            orbitControls.enabled = true; // 드래그 끝나면 화면 회전 복구
        });

        // 7. 💥 클릭하면 띠용띠용
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isBouncing = false;
        let bounceTime = 0;

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(allParts);

            if (intersects.length > 0 && !isBouncing) {
                isBouncing = true;
                bounceTime = 0;
            }
        });

        // 8. 🔄 애니메이션 루프 (둥둥 뜨기 + 물살 효과)
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            orbitControls.update();

            // 물살에 기우뚱 + 둥둥 뜨기
            if (!isDragging) {
                duckGroup.position.y = Math.sin(elapsedTime * 2) * 0.12;
                duckGroup.position.x = Math.sin(elapsedTime * 0.8) * 0.2;
                duckGroup.position.z = Math.cos(elapsedTime * 1.1) * 0.15;
                
                duckGroup.rotation.z = Math.sin(elapsedTime * 1.5) * 0.05;
                duckGroup.rotation.x = Math.cos(elapsedTime * 1.2) * 0.03;
            }

            // 띠용띠용 계산
            if (isBouncing) {
                bounceTime += 0.15;
                const scaleFactor = 1 + Math.sin(bounceTime) * 0.3 * Math.exp(-bounceTime * 0.3);
                duckGroup.scale.set(scaleFactor, scaleFactor, scaleFactor);

                if (bounceTime > 10) {
                    isBouncing = false;
                    duckGroup.scale.set(1, 1, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
